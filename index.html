<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Margarito - Inicio</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container { text-align: center; max-width: 600px; }

        h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            color: #3b82f6;
            letter-spacing: -2px;
        }

        .subtitle { color: #94a3b8; margin-bottom: 40px; }

        .cards { display: flex; gap: 20px; justify-content: center; }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #334155;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s, background 0.3s;
            width: 200px;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #3b82f6;
            background: #263349;
        }

        .card h2 { margin-top: 0; font-size: 1.5rem; }
        .card p  { font-size: 0.9rem; margin-bottom: 0; color: #94a3b8; }

        .admin-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .admin-btn:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Deep Margarito</h1>
        <p class="subtitle">San Agus</p>

        <div class="cards">
            <!-- Acceso público: va directo al grafo sin contraseña -->
            <div class="card" onclick="window.location.href='/grafo.html'">
                <h2>👁 Invitado</h2>
                <p>Ver el grafo sin editar</p>
            </div>

            <!-- Acceso admin: pide contraseña antes de entrar -->
            <div class="card">
                <h2>🔑 Admin</h2>
                <p>Editar conexiones</p>
                <button class="admin-btn" onclick="accesoAdmin()">Entrar</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Pide la contraseña al admin, la valida contra el servidor y,
         * si es correcta, guarda el token en sessionStorage antes de
         * redirigir a grafo.html?admin=true.
         *
         * El token dura solo mientras el tab esté abierto (sessionStorage
         * se borra al cerrar el navegador).
         */
        async function accesoAdmin() {
            const pass = prompt('Introduce la contraseña:');
            if (!pass) return; // El usuario canceló el prompt

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass })
                });

                const result = await response.json();

                if (result.success) {
                    sessionStorage.setItem('margarito_token', result.token);
                    window.location.href = '/grafo.html?admin=true';
                } else {
                    alert('Clave incorrecta');
                }
            } catch {
                alert('No se pudo conectar con el servidor.');
            }
        }
    </script>
</body>
</html>
