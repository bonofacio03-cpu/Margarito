<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Margarito - Visualizador</title>
    <style>
        /* ── Layout base ─────────────────────────────────────────────────────── */
        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* ── Panel admin (oculto para invitados) ─────────────────────────────── */
        #admin-panel {
            display: none;          /* Se muestra por JS solo si isAdmin === true */
            gap: 10px;
            margin-bottom: 20px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        /* ── Buscador (visible para todos) ───────────────────────────────────── */
        #search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        /* ── Campos compartidos ──────────────────────────────────────────────── */
        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            flex: 1;
        }

        button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover { background: #2563eb; }

        /* ── Lienzo del grafo ────────────────────────────────────────────────── */
        #cy {
            width: 100%;
            height: calc(100vh - 170px);
            background: #0f172a;
            border-radius: 16px;
            border: 1px solid #1e293b;
        }

        /* ── Indicador de modo (esquina superior derecha) ────────────────────── */
        .mode-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(30, 41, 59, 0.8);
        }
    </style>

    <!-- Cytoscape.js: librería de grafos interactivos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
</head>
<body>

    <!-- Panel exclusivo para el admin: añadir conexiones nuevas -->
    <div id="admin-panel">
        <input type="text" id="nodeA" placeholder="Persona A">
        <input type="text" id="nodeB" placeholder="Persona B">
        <button onclick="addConnection()">Añadir Conexión</button>
    </div>

    <!-- Buscador: filtra y resalta nodos por nombre -->
    <div id="search-container">
        <input
            type="text"
            id="searchInput"
            placeholder="Buscar nombre…"
            oninput="searchNode()"
        >
        <button onclick="clearSearch()" style="background:#64748b;">Limpiar</button>
    </div>

    <!-- Etiqueta de modo en la esquina -->
    <div class="mode-indicator" id="status-tag">Modo Invitado</div>

    <!-- Contenedor donde Cytoscape renderiza el grafo -->
    <div id="cy"></div>

    <script>
        // ── Detección de modo admin ─────────────────────────────────────────────
        // Un usuario es admin solo si:
        //   1. La URL tiene ?admin=true
        //   2. Tiene un token guardado en sessionStorage (lo recibió del servidor)
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin   = urlParams.get('admin') === 'true'
                       && sessionStorage.getItem('margarito_token') !== null;

        if (isAdmin) {
            document.getElementById('admin-panel').style.display = 'flex';
            const tag = document.getElementById('status-tag');
            tag.innerText = 'ADMINISTRADOR';
            tag.style.color = '#4ade80';
        }

        // ── Color determinista por nombre ───────────────────────────────────────
        // Convierte el ID del nodo en un color HSL único y reproducible.
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            return `hsl(${Math.abs(hash) % 360}, 70%, 60%)`;
        }

        // ── Inicialización de Cytoscape ─────────────────────────────────────────
        const cy = cytoscape({
            container: document.getElementById('cy'),
            style: [
                {
                    // Nodos: tamaño proporcional al grado (número de conexiones)
                    selector: 'node',
                    style: {
                        'background-color':  ele => stringToColor(ele.id()),
                        'label':             'data(id)',
                        'color':             '#fff',
                        'text-valign':       'center',
                        'text-outline-width': 2,
                        'text-outline-color': '#0f172a',
                        'width':  'mapData(degree, 0, 10, 40, 120)',
                        'height': 'mapData(degree, 0, 10, 40, 120)',
                        'font-size': '14px'
                    }
                },
                {
                    // Aristas: línea curva semitransparente
                    selector: 'edge',
                    style: {
                        'width':       4,
                        'line-color':  '#475569',
                        'curve-style': 'bezier',
                        'opacity':     0.6
                    }
                },
                {
                    // Arista seleccionada: rojo brillante
                    selector: 'edge:selected',
                    style: {
                        'line-color': '#ef4444',
                        'width':      6,
                        'opacity':    1
                    }
                },
                {
                    // Nodo/arista resaltado por la búsqueda: borde dorado
                    selector: '.highlighted',
                    style: {
                        'border-width':        6,
                        'border-color':        '#f59e0b',
                        'line-color':          '#f59e0b',
                        'target-arrow-color':  '#f59e0b',
                        'font-size':           20,
                        'font-weight':         'bold',
                        'z-index':             9999
                    }
                },
                {
                    // Elemento no relevante en la búsqueda: muy transparente
                    selector: '.faded',
                    style: {
                        'opacity': 0.1,
                        'events':  'no'
                    }
                }
            ]
        });

        // ── Funciones exclusivas del admin ──────────────────────────────────────
        if (isAdmin) {

            // Elimina nodos que quedaron sin ninguna conexión
            function cleanOrphans() {
                cy.nodes()
                  .filter(node => node.connectedEdges().length === 0)
                  .remove();
            }

            // Borrar con tecla Delete o Backspace
            document.addEventListener('keydown', (e) => {
                if (e.key !== 'Delete' && e.key !== 'Backspace') return;
                const selected = cy.$(':selected');
                if (selected.length === 0) return;

                if (confirm('¿Eliminar los elementos seleccionados?')) {
                    selected.remove();
                    cleanOrphans();
                    updateNodeSizes();
                    saveData();
                }
            });

            // Borrar una arista con doble clic sobre ella
            cy.on('dblclick', 'edge', (evt) => {
                if (!confirm('¿Eliminar esta conexión?')) return;
                evt.target.remove();
                cleanOrphans();
                updateNodeSizes();
                saveData();
            });
        }

        // ── Actualiza el campo 'degree' de cada nodo ────────────────────────────
        // Cytoscape usa ese valor en mapData para escalar el tamaño visual.
        function updateNodeSizes() {
            cy.nodes().forEach(node => {
                node.data('degree', node.degree());
            });
        }

        // ── Añadir una conexión nueva (solo admin) ──────────────────────────────
        async function addConnection() {
            if (!isAdmin) return;

            const a = document.getElementById('nodeA').value.trim();
            const b = document.getElementById('nodeB').value.trim();
            if (!a || !b || a === b) return;

            // Crear nodos si no existen
            if (cy.getElementById(a).empty()) cy.add({ group: 'nodes', data: { id: a } });
            if (cy.getElementById(b).empty()) cy.add({ group: 'nodes', data: { id: b } });

            // Comprobar que la arista no existe ya (en ninguna dirección)
            const yaExiste = cy.edges().some(e =>
                (e.source().id() === a && e.target().id() === b) ||
                (e.source().id() === b && e.target().id() === a)
            );

            if (!yaExiste) {
                cy.add({ group: 'edges', data: { source: a, target: b } });
                updateNodeSizes();
                cy.layout({ name: 'cose', animate: true }).run();
                await saveData();
            }

            document.getElementById('nodeA').value = '';
            document.getElementById('nodeB').value = '';
        }

        // ── Guardar el estado del grafo en el servidor ──────────────────────────
        async function saveData() {
            const token    = sessionStorage.getItem('margarito_token');
            const elements = cy.json().elements;

            const response = await fetch('/api/graph', {
                method:  'POST',
                headers: {
                    'Content-Type':  'application/json',
                    'Authorization': token
                },
                body: JSON.stringify(elements)
            });

            if (!response.ok) {
                alert('Error de autorización: no se pudo guardar.');
                window.location.href = '/'; // Redirige si el token es inválido
            }
        }

        // ── Cargar el grafo desde el servidor al iniciar ─────────────────────────
        async function loadData() {
            const res  = await fetch('/api/graph');
            const data = await res.json();

            if (data && data.nodes && data.nodes.length > 0) {
                cy.add(data);
                updateNodeSizes();
                cy.layout({ name: 'cose' }).run();
            }
        }

        // ── Búsqueda: resaltar nodo y sus vecinos ───────────────────────────────
        function searchNode() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();

            if (term === '') {
                clearSearch();
                return;
            }

            const matches = cy.nodes().filter(n => n.id().toLowerCase().includes(term));

            if (matches.length === 0) return;

            cy.elements().removeClass('highlighted faded');

            const vecindario = matches.neighborhood().add(matches);
            cy.elements().difference(vecindario).addClass('faded');
            vecindario.addClass('highlighted');

            cy.animate({
                center:   { eles: matches },
                zoom:     1.5,
                duration: 500
            });
        }

        // ── Limpiar búsqueda: volver a la vista completa ────────────────────────
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            cy.elements().removeClass('highlighted faded');
            cy.animate({
                fit:      { eles: cy.elements(), padding: 50 },
                duration: 500
            });
        }

        // ── Arranque ────────────────────────────────────────────────────────────
        loadData();
    </script>
</body>
</html>
