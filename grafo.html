<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Margarito - Visualizador</title>
    <style>
        body {
            background: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        #admin-panel {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .admin-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .admin-row label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            min-width: 80px;
        }

        .admin-divider {
            border: none;
            border-top: 1px solid #334155;
            margin: 4px 0;
        }

        #search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            flex: 1;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        button:hover { background: #2563eb; }

        #cy {
            width: 100%;
            height: calc(100vh - 170px);
            background: #0f172a;
            border-radius: 16px;
            border: 1px solid #1e293b;
        }

        .mode-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(30, 41, 59, 0.8);
        }

        /* ── Modal de confirmación ────────────────────────────────────────────── */
        #confirm-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        #confirm-modal.visible {
            display: flex;
        }

        .modal-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 28px 32px;
            max-width: 360px;
            width: 100%;
            text-align: center;
        }

        .modal-box p {
            margin: 0 0 24px;
            font-size: 15px;
            color: #cbd5e1;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-actions button.cancel {
            background: #334155;
        }

        .modal-actions button.cancel:hover {
            background: #475569;
        }

        .modal-actions button.danger {
            background: #ef4444;
        }

        .modal-actions button.danger:hover {
            background: #dc2626;
        }

        /* ── Toast ───────────────────────────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.3s ease;
            z-index: 9999;
            background: #ef4444;
        }

        #toast.visible {
            transform: translateX(-50%) translateY(0);
        }

        #toast.success {
            background: #22c55e;
        }

        /* ── Modal de renombrado ─────────────────────────────────────────────── */
        #rename-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        #rename-modal.visible {
            display: flex;
        }

        #rename-modal .modal-box {
            max-width: 400px;
        }

        #rename-modal .modal-box p {
            margin: 0 0 16px;
        }

        #rename-input {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .modal-actions button.confirm {
            background: #f59e0b;
        }
        .modal-actions button.confirm:hover {
            background: #d97706;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://unpkg.com/layout-base/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>
</head>
<body>

    <div id="admin-panel">

        <!-- Añadir conexión -->
        <div class="admin-row">
            <label>Conectar</label>
            <input type="text" id="nodeA" placeholder="Persona A">
            <input type="text" id="nodeB" placeholder="Persona B">
            <button id="btn-add">Añadir Conexión</button>
        </div>

    </div>

    <div id="search-container">
        <input type="text" id="searchInput" placeholder="Buscar nombre…">
        <button id="btn-relayout" style="background:#6366f1;" title="Redistribuir grafo">⟳ Redistribuir</button>
        <button id="btn-clear" style="background:#64748b;">Limpiar</button>
    </div>

    <div class="mode-indicator" id="status-tag">Modo Invitado</div>
    <div id="cy"></div>

    <!-- Modal de confirmación -->
    <div id="confirm-modal">
        <div class="modal-box">
            <p id="confirm-text">¿Eliminar los elementos seleccionados?</p>
            <div class="modal-actions">
                <button class="cancel" id="confirm-cancel">Cancelar</button>
                <button class="danger" id="confirm-ok">Eliminar</button>
            </div>
        </div>
    </div>

    <!-- Modal de renombrado -->
    <div id="rename-modal">
        <div class="modal-box">
            <p id="rename-modal-text">Nuevo nombre para <strong id="rename-modal-name"></strong>:</p>
            <input type="text" id="rename-input" placeholder="Nuevo nombre…">
            <div class="modal-actions">
                <button class="cancel" id="rename-cancel">Cancelar</button>
                <button class="confirm" id="rename-ok">Renombrar</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script>
        // ── Utilidades de UI ────────────────────────────────────────────────────

        function showToast(msg, type = 'error') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = type === 'success' ? 'visible success' : 'visible';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.className = '', 3000);
        }

        function showConfirm(text) {
            return new Promise(resolve => {
                const modal     = document.getElementById('confirm-modal');
                const textEl    = document.getElementById('confirm-text');
                const okBtn     = document.getElementById('confirm-ok');
                const cancelBtn = document.getElementById('confirm-cancel');

                textEl.textContent = text;
                modal.classList.add('visible');

                function cleanup(result) {
                    modal.classList.remove('visible');
                    okBtn.removeEventListener('click', onOk);
                    cancelBtn.removeEventListener('click', onCancel);
                    resolve(result);
                }

                const onOk     = () => cleanup(true);
                const onCancel = () => cleanup(false);

                okBtn.addEventListener('click', onOk);
                cancelBtn.addEventListener('click', onCancel);
            });
        }

        function showRenameModal(oldName) {
            return new Promise(resolve => {
                const modal     = document.getElementById('rename-modal');
                const nameEl    = document.getElementById('rename-modal-name');
                const input     = document.getElementById('rename-input');
                const okBtn     = document.getElementById('rename-ok');
                const cancelBtn = document.getElementById('rename-cancel');

                nameEl.textContent = oldName;
                input.value = oldName;
                modal.classList.add('visible');
                setTimeout(() => { input.focus(); input.select(); }, 50);

                function cleanup(result) {
                    modal.classList.remove('visible');
                    okBtn.removeEventListener('click', onOk);
                    cancelBtn.removeEventListener('click', onCancel);
                    input.removeEventListener('keydown', onKey);
                    resolve(result);
                }

                const onOk     = () => cleanup(input.value.trim() || null);
                const onCancel = () => cleanup(null);
                const onKey    = (e) => {
                    if (e.key === 'Enter')  { e.preventDefault(); onOk(); }
                    if (e.key === 'Escape') { e.preventDefault(); onCancel(); }
                };

                okBtn.addEventListener('click', onOk);
                cancelBtn.addEventListener('click', onCancel);
                input.addEventListener('keydown', onKey);
            });
        }

        async function doRenameNode(node) {
            const oldName = node.id();
            const newName = await showRenameModal(oldName);

            if (!newName || newName === oldName) return;

            if (!cy.getElementById(newName).empty()) {
                showToast(`Ya existe un nodo con el nombre "${newName}".`);
                return;
            }

            const position = { ...node.position() };
            const edges = node.connectedEdges().map(e => ({
                source: e.source().id() === oldName ? newName : e.source().id(),
                target: e.target().id() === oldName ? newName : e.target().id()
            }));

            node.remove();
            cy.add({ group: 'nodes', data: { id: newName }, position });

            edges.forEach(({ source, target }) => {
                const dup = cy.edges().some(e =>
                    (e.source().id() === source && e.target().id() === target) ||
                    (e.source().id() === target && e.target().id() === source)
                );
                if (!dup) cy.add({ group: 'edges', data: { source, target } });
            });

            updateNodeSizes();
            showToast(`"${oldName}" → "${newName}"`, 'success');
            await saveData();
        }

        // ── Detección de modo admin ─────────────────────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const token     = sessionStorage.getItem('margarito_token');
        const isAdmin   = urlParams.get('admin') === 'true' && token !== null;

        if (isAdmin) {
            document.getElementById('admin-panel').style.display = 'flex';
            const tag = document.getElementById('status-tag');
            tag.textContent  = 'ADMINISTRADOR';
            tag.style.color  = '#4ade80';
        }

        // ── Color determinista por nombre ───────────────────────────────────────
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            return `hsl(${Math.abs(hash) % 360}, 70%, 60%)`;
        }

        // ── Inicialización de Cytoscape ─────────────────────────────────────────
        const cy = cytoscape({
            container: document.getElementById('cy'),
            style: [
                {
                    selector: 'node',
                    style: {
                        'background-color':   ele => stringToColor(ele.id()),
                        'label':              'data(id)',
                        'color':              '#fff',
                        'text-valign':        'center',
                        'text-outline-width': 2,
                        'text-outline-color': '#0f172a',
                        'width':              40,
                        'height':             40,
                        'font-size':          '12px'
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width':           2,
                        'line-color':      '#475569',
                        'curve-style':     'bezier',
                        'opacity':         0.5,
                        'line-style':      'solid'
                    }
                },
                {
                    selector: 'edge:selected',
                    style: {
                        'line-color': '#ef4444',
                        'width':      6,
                        'opacity':    1
                    }
                },
                {
                    selector: '.highlighted',
                    style: {
                        'border-width':       6,
                        'border-color':       '#f59e0b',
                        'line-color':         '#f59e0b',
                        'target-arrow-color': '#f59e0b',
                        'font-size':          20,
                        'font-weight':        'bold',
                        'z-index':            9999
                    }
                },
                {
                    selector: '.faded',
                    style: {
                        'opacity': 0.1,
                        'events':  'no'
                    }
                }
            ]
        });

        // ── Tamaños de nodos y parámetros de layout ─────────────────────────────
        const MIN_SIZE = 40;
        const MAX_SIZE = 120;

        function updateNodeSizes() {
            const degrees = cy.nodes().map(n => n.degree());
            const maxDeg  = Math.max(...degrees, 1);

            cy.nodes().forEach(node => {
                const deg  = node.degree();
                const size = Math.round(MIN_SIZE + (deg / maxDeg) * (MAX_SIZE - MIN_SIZE));
                const fs   = Math.max(10, size * 0.25);
                node.style({ 'width': size, 'height': size, 'font-size': fs });
            });
        }

        /**
         * Devuelve la configuración de layout.
         * Usa fcose si está disponible (mejor anti-overlap para grafos grandes),
         * si no, cae a cose con parámetros robustos.
         */
        function getLayoutOptions(animate = true) {
            const nodeCount = cy.nodes().length;
            const useFcose  = typeof cytoscapeFcose !== 'undefined' || cy.layoutUtilities !== undefined || _fcoseReady;

            if (_fcoseReady) {
                // ── fcose: separación garantizada por radio de nodo ──────────────
                return {
                    name:                    'fcose',
                    animate,
                    animationDuration:       animate ? 800 : 0,
                    animationEasing:         'ease-out',
                    fit:                     true,
                    padding:                 60,
                    // Fuerza de separación entre nodos — mayor = más espacio
                    nodeRepulsion:           nodeCount > 80 ? 12000 : 8000,
                    // Longitud ideal de arista en px
                    idealEdgeLength:         MAX_SIZE * 2,
                    edgeElasticity:          0.45,
                    // Separación mínima entre bordes de nodos (px)
                    nodeSeparation:          MAX_SIZE * 0.6,
                    gravity:                 0.25,
                    gravityRange:            3.8,
                    gravityCompound:         1.0,
                    gravityRangeCompound:    1.5,
                    numIter:                 nodeCount > 100 ? 5000 : 2500,
                    tile:                    true,          // distribuye componentes desconectados
                    tilingPaddingVertical:   40,
                    tilingPaddingHorizontal: 40,
                    randomize:               true,          // punto de partida aleatorio → mejor distribución
                    uniformNodeDimensions:   false,
                    packComponents:          true,
                    step:                    'all'
                };
            }

            // ── Fallback: cose mejorado ──────────────────────────────────────────
            const maxRadius = MAX_SIZE / 2;
            const repulsion = Math.max(10000, Math.round(Math.PI * maxRadius * maxRadius * 5));
            return {
                name:              'cose',
                animate,
                animationDuration: animate ? 800 : 0,
                nodeOverlap:       4,
                nodeRepulsion:     () => repulsion,
                idealEdgeLength:   () => MAX_SIZE * 2,
                edgeElasticity:    () => 80,
                gravity:           0.4,
                numIter:           3000,
                initialTemp:       300,
                coolingFactor:     0.99,
                minTemp:           1.0,
                fit:               true,
                padding:           60,
                randomize:         true
            };
        }

        // Registra fcose cuando sus scripts carguen
        let _fcoseReady = false;
        window.addEventListener('load', () => {
            if (window.cytoscapeFcose) {
                cytoscape.use(window.cytoscapeFcose);
                _fcoseReady = true;
            }
        });

        // ── Lógica exclusiva del admin ──────────────────────────────────────────
        if (isAdmin) {

            function cleanOrphans() {
                cy.nodes()
                  .filter(node => node.connectedEdges().length === 0)
                  .remove();
            }

            document.addEventListener('keydown', async (e) => {
                if (e.key !== 'Delete' && e.key !== 'Backspace') return;
                if (document.activeElement.tagName === 'INPUT') return;
                const selected = cy.$(':selected');
                if (selected.length === 0) return;

                const ok = await showConfirm('¿Eliminar los elementos seleccionados?');
                if (!ok) return;

                selected.remove();
                cleanOrphans();
                updateNodeSizes();
                cy.layout(getLayoutOptions(true)).run();
                await saveData();
            });

            cy.on('dblclick', 'node', (evt) => {
                doRenameNode(evt.target);
            });

            cy.on('dblclick', 'edge', async (evt) => {
                const ok = await showConfirm('¿Eliminar esta conexión?');
                if (!ok) return;

                evt.target.remove();
                cleanOrphans();
                updateNodeSizes();
                cy.layout(getLayoutOptions(true)).run();
                await saveData();
            });

            document.getElementById('btn-add').addEventListener('click', addConnection);
        }

        document.getElementById('btn-clear').addEventListener('click', clearSearch);
        document.getElementById('btn-relayout').addEventListener('click', () => {
            updateNodeSizes();
            cy.layout(getLayoutOptions(true)).run();
        });
        document.getElementById('searchInput').addEventListener('input', searchNode);

        // ── Añadir conexión ─────────────────────────────────────────────────────
        async function addConnection() {
            if (!isAdmin) return;

            const a = document.getElementById('nodeA').value.trim();
            const b = document.getElementById('nodeB').value.trim();
            if (!a || !b || a === b) return;

            if (cy.getElementById(a).empty()) cy.add({ group: 'nodes', data: { id: a } });
            if (cy.getElementById(b).empty()) cy.add({ group: 'nodes', data: { id: b } });

            const yaExiste = cy.edges().some(e =>
                (e.source().id() === a && e.target().id() === b) ||
                (e.source().id() === b && e.target().id() === a)
            );

            if (!yaExiste) {
                cy.add({ group: 'edges', data: { source: a, target: b } });
                updateNodeSizes();
                cy.layout(getLayoutOptions(true))
                  .on('layoutstop', () => saveData())
                  .run();
            }

            document.getElementById('nodeA').value = '';
            document.getElementById('nodeB').value = '';
        }

        // ── Guardar en el servidor ──────────────────────────────────────────────
        async function saveData() {
            try {
                const elements = cy.json().elements;
                const nodes = elements.nodes ?? [];
                const edges = elements.edges ?? [];

                const response = await fetch('/api/graph', {
                    method:  'POST',
                    headers: {
                        'Content-Type':  'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ nodes, edges })
                });

                if (response.status === 403) {
                    showToast('Sesión expirada. Vuelve a iniciar sesión.');
                    setTimeout(() => window.location.href = '/', 2000);
                    return;
                }

                if (!response.ok) {
                    showToast('Error al guardar. Inténtalo de nuevo.');
                }
            } catch (err) {
                console.error('saveData error:', err);
                showToast('Sin conexión con el servidor.');
            }
        }

        // ── Cargar el grafo ─────────────────────────────────────────────────────
        async function loadData() {
            try {
                const res = await fetch('/api/graph');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                if (data?.nodes?.length > 0) {
                    cy.add(data);
                    updateNodeSizes();

                    // Espera un tick para que los scripts de fcose terminen de registrarse
                    requestAnimationFrame(() => {
                        cy.layout(getLayoutOptions(false)).run();
                    });
                }
            } catch (err) {
                console.error('Error cargando grafo:', err);
                showToast('No se pudo cargar el grafo. Recarga la página.');
            }
        }

        // ── Búsqueda ────────────────────────────────────────────────────────────
        function searchNode() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if (term === '') { clearSearch(); return; }

            const matches = cy.nodes().filter(n => n.id().toLowerCase().includes(term));
            if (matches.length === 0) return;

            cy.elements().removeClass('highlighted faded');
            const vecindario = matches.neighborhood().add(matches);
            cy.elements().difference(vecindario).addClass('faded');
            vecindario.addClass('highlighted');
            cy.animate({ center: { eles: matches }, zoom: 1.5, duration: 500 });
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            cy.elements().removeClass('highlighted faded');
            cy.animate({ fit: { eles: cy.elements(), padding: 50 }, duration: 500 });
        }

        // ── Arranque ────────────────────────────────────────────────────────────
        loadData();
    </script>
</body>
</html>
